name: Powerline Monitor
version: "0.4.0"
slug: powerline_monitor
description: >-
  Monitor TP-Link / HomePlug AV2 powerline link rates with open-plc-utils and
  publish them to Home Assistant over MQTT.
url: "https://github.com/pavelpep/ha-powerline-monitor"
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: services
boot: auto
# Base image ships s6-overlay as its own init; it must be PID 1.
init: false
# Needed so the container can see the real host NIC and send raw L2 frames.
host_network: true
privileged:
  - NET_ADMIN
  - NET_RAW
# Auto-pulls broker credentials if the Mosquitto add-on is installed.
services:
  - mqtt:want
options:
  interface: ""
  adapter_mac: ""
  poll_interval: 60
  degraded_threshold: 50
  station_names: []
  expose_diagnostics: false
  discovery_prefix: homeassistant
  diagnostic: true
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
schema:
  interface: str?
  adapter_mac: str?
  poll_interval: int(10,)
  degraded_threshold: int(0,)
  station_names:
    - str
  expose_diagnostics: bool
  discovery_prefix: str
  diagnostic: bool
  mqtt_host: str?
  mqtt_port: port?
  mqtt_user: str?
  mqtt_password: password?
